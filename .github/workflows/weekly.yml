name: Weekly Report

on:
  schedule:
    # 每週一台北時間下午三點
    - cron: '0 7 * * 1'   # UTC+0 → 台北 UTC+8 → 15:00
  workflow_dispatch:       # 可以手動觸發

jobs:
  weekly-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Debug analyzer functions
        run: |
          python - << 'EOF'
          import analyzer
          print("Functions in analyzer:", dir(analyzer))
          EOF

      - name: Run weekly report
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_CHANNEL_SECRET: ${{ secrets.LINE_CHANNEL_SECRET }}
          YAHOO_LEAGUE_ID: ${{ secrets.YAHOO_LEAGUE_ID }}
        run: python weekly.py
